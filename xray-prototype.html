<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargon Eliminator: Editor Workflow</title>
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-card: #1a1a2e;
            --color-blue: #00d4ff;
            --color-teal: #14b8a6;
            --color-text: #f5f5f5;
            --color-del: #ff4d4d;
            --color-ins: #14b8a6;
        }
        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--color-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-sizing: border-box;
            position: relative;
        }
        h2 { 
            margin-top: 0; 
            color: var(--color-blue); 
            text-align: center; 
            font-size: 32px;
            margin-bottom: 10px;
        }
        p.subtitle { 
            text-align: center; 
            color: #aaa; 
            margin-bottom: 40px; 
            font-size: 16px;
            line-height: 1.5;
        }
        
        /* Tabs Setup */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .tab-btn.active {
            background: var(--color-teal);
            border-color: var(--color-teal);
            color: #000;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
        }

        /* Clarity Display Setup */
        .clarity-wrap {
            position: relative;
            width: 100%;
            min-height: 250px;
            background: #0d0d14;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            padding: 40px;
            box-sizing: border-box;
        }

        .dynamic-text {
            font-size: 20px;
            line-height: 1.8;
            text-align: center;
            transition: font-family 0.3s, filter 0.3s;
        }

        /* The final states */
        .state-jargon {
            font-family: 'Courier New', Courier, monospace;
            color: #7a8a92;
        }
        .state-regular {
            font-family: 'Inter', Arial, sans-serif;
            color: #f5f5f5;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .state-tech {
            font-family: 'Inter', Arial, sans-serif;
            color: var(--color-blue);
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        /* Editor Markup Tags */
        .edit-del {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            color: var(--color-del);
            opacity: 0.7;
            background: rgba(255, 77, 77, 0.1);
            padding: 0 2px;
            border-radius: 3px;
        }
        .edit-ins {
            text-decoration: none;
            color: var(--color-ins);
            background: rgba(20, 184, 166, 0.15);
            border-bottom: 2px dashed var(--color-ins);
            padding: 0 2px;
            border-radius: 3px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(20, 184, 166, 0.3);
        }

        /* Continuous Slider Setup */
        .slider-container {
            width: 100%;
            position: relative;
            padding: 0 10px;
            box-sizing: border-box;
        }
        
        .stage-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #2a2a3e 0%, #14b8a6 50%, #00d4ff 100%);
            border-radius: 3px;
            outline: none;
            margin: 0;
            position: relative;
            z-index: 2;
        }
        
        .stage-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            cursor: grab;
            transition: transform 0.1s;
        }

        .stage-slider:active::-webkit-slider-thumb {
            transform: scale(1.2);
            cursor: grabbing;
        }

        /* Labels */
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }
        
        .label-0 { position: absolute; left: 0; transform: translateX(0); }
        .label-50 { position: absolute; left: 50%; transform: translateX(-50%); }
        .label-100 { position: absolute; right: 0; transform: translateX(0); color: var(--color-blue);}

    </style>
</head>
<body>

    <div class="container">
        <h2>The Audience Optimization Engine</h2>
        <p class="subtitle">Experience the editing workflow: Watch as bloated jargon is physically crossed out and replaced to forge effective marketing copy, and then refined into hyper-targeted B2B positioning.</p>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="cyber">Cybersecurity</button>
            <button class="tab-btn" data-tab="pc">PC Hardware</button>
            <button class="tab-btn" data-tab="saas">SaaS Ecosystem</button>
            <button class="tab-btn" data-tab="consumer">Consumer Electronics</button>
        </div>

        <div class="clarity-wrap">
            <div class="dynamic-text state-jargon" id="message-display">
                <!-- Morphing text populated by JS -->
            </div>
        </div>

        <div class="slider-container">
            <input type="range" class="stage-slider" id="stage-slider" min="0" max="100" value="0">
            <div class="slider-labels">
                <span class="label-0">Raw Jargon</span>
                <span class="label-50">General Audience</span>
                <span class="label-100">Technical Audience</span>
            </div>
        </div>
    </div>
    
    <script>
        const contentData = {
            "cyber": {
                jargon: "Our next-gen AI-driven XDR platform utilizes zero-trust heuristic behavioral endpoints, leveraging cryptographic lateral-movement prevention and decentralized threat-intelligence lakes to neutralize zero-day exploits natively.",
                regular: "Stop cyber attacks before they happen. Our AI monitors your network 24/7, automatically locking down unseen threats so your business stays completely secure.",
                tech: "Deploy zero-trust AI that instantly identifies and isolates anomalous endpoint behavior, dynamically securing your architecture against lateral breaches without disrupting workflow."
            },
            "pc": {
                jargon: "Featuring a 14-core hybrid architecture with P-cores boosting to 5.2GHz and integrated 32-execution-unit UHD graphics, paired with DDR5-5600 MT/s dual-channel memory topology for minimized latency bottlenecks.",
                regular: "Uncompromising speed for gamers and creators. Multitask effortlessly and enjoy buttery-smooth performance, no matter how demanding the workload.",
                tech: "Maximize compute overhead with a 5.2GHz hybrid architecture and DDR5 bandwidth, delivering zero-latency multitasking directly to power users and pro-creators."
            },
            "saas": {
                jargon: "A cloud-native, multi-tenant headless CRM solution utilizing asynchronous microservices and a GraphQL API layer to maximize cross-relational data synergy and modular scalability.",
                regular: "A flexible CRM that scales flawlessly with your business. Get complete control over your customer data, perfectly integrated across all your platforms.",
                tech: "Unify your data ecosystem with a scalable, API-first headless CRM featuring robust microservice integration to natively bridge your entire tech stack."
            },
            "consumer": {
                jargon: "Equipped with quad-binning 108MP CMOS sensors, 120Hz LTPO OLED adaptive refresh matrix, and ultrasonic under-display biometric authentication powered by an SoC with specialized NPU cores.",
                regular: "Capture stunning, crystal-clear photos and unlock your phone instantly. Enjoy a brilliantly smooth display that adapts to your eyes and extends your battery life.",
                tech: "Leverage intelligent NPU processing and adaptive 120Hz LTPO displays to deliver flawless biometric security, maximized battery efficiency, and uncompromised optical clarity."
            }
        };

        const tabs = document.querySelectorAll('.tab-btn');
        const textDisplay = document.getElementById('message-display');
        const slider = document.getElementById('stage-slider');
        
        let currentTab = 'cyber';

        class EditorMorph {
            constructor(strA, strB) {
                // Split by spaces, treating punctuation as attached to words
                let wordsA = strA.split(' ');
                let wordsB = strB.split(' ');
                
                // Dynamic Programming string alignment (Longest Common Subsequence concept)
                const matrix = Array(wordsA.length + 1).fill(null).map(() => Array(wordsB.length + 1).fill(0));
                for (let i = 1; i <= wordsA.length; i++) {
                    for (let j = 1; j <= wordsB.length; j++) {
                        // Case-insensitive match for smoother transitions
                        if (wordsA[i - 1].toLowerCase() === wordsB[j - 1].toLowerCase()) {
                            matrix[i][j] = matrix[i - 1][j - 1] + 1;
                        } else {
                            matrix[i][j] = Math.max(matrix[i - 1][j], matrix[i][j - 1]);
                        }
                    }
                }
                
                let i = wordsA.length, j = wordsB.length;
                let edits = [];
                while (i > 0 || j > 0) {
                    if (i > 0 && j > 0 && wordsA[i - 1].toLowerCase() === wordsB[j - 1].toLowerCase()) {
                        edits.push({ type: 'keep', val: wordsB[j - 1] }); // prefer new casing
                        i--; j--;
                    } else if (j > 0 && (i === 0 || matrix[i][j - 1] >= matrix[i - 1][j])) {
                        edits.push({ type: 'ins', val: wordsB[j - 1] });
                        j--;
                    } else if (i > 0 && (j === 0 || matrix[i][j - 1] < matrix[i - 1][j])) {
                        edits.push({ type: 'del', val: wordsA[i - 1] });
                        i--;
                    }
                }
                this.edits = edits.reverse();
                
                // Assign independent random transition zones across the slider pull
                this.edits.forEach(e => {
                    // Start transition somewhere between 10% and 80% pull
                    e.t = Math.random() * 0.7 + 0.15; 
                });
            }

            getString(p) {
                let result = [];
                for(let e of this.edits) {
                    if (e.type === 'keep') {
                        result.push(e.val);
                    } else if (e.type === 'del') {
                        if (p < e.t - 0.15) {
                            result.push(e.val); // Not deleted yet
                        } else if (p <= e.t + 0.15) {
                            result.push(`<del class="edit-del">${e.val}</del>`); // Being crossed out
                        }
                        // if tracking past t+0.15, word completely vanishes
                    } else if (e.type === 'ins') {
                        if (p >= e.t - 0.15 && p <= e.t + 0.15) {
                            result.push(`<ins class="edit-ins">${e.val}</ins>`); // Being highlighted/inserted
                        } else if (p > e.t + 0.15) {
                            result.push(e.val); // Fully permanent
                        }
                        // if tracking before t-0.15, word is invisible
                    }
                }
                return result.join(' ');
            }
        }

        let morphJargonToReg;
        let morphRegToTech;

        function initMorphers() {
            morphJargonToReg = new EditorMorph(contentData[currentTab].jargon, contentData[currentTab].regular);
            morphRegToTech = new EditorMorph(contentData[currentTab].regular, contentData[currentTab].tech);
        }
        initMorphers();

        function renderSlider() {
            const val = parseInt(slider.value);
            
            // Phase 1: 0 to 50
            if (val <= 50) {
                const p = val / 50; 
                textDisplay.innerHTML = morphJargonToReg.getString(p);
                
                // Typography/Spacing transition
                if (val < 15) textDisplay.className = 'dynamic-text state-jargon';
                else textDisplay.className = 'dynamic-text state-regular';
            } 
            // Phase 2: 50 to 100
            else {
                const p = (val - 50) / 50; 
                textDisplay.innerHTML = morphRegToTech.getString(p);

                // Switch to tech styling dynamically
                if (val > 85) textDisplay.className = 'dynamic-text state-tech';
                else textDisplay.className = 'dynamic-text state-regular';
            }
        }

        // Handle Tab Switching
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                currentTab = e.target.getAttribute('data-tab');
                initMorphers();
                
                textDisplay.style.filter = "blur(5px)";
                setTimeout(() => {
                    renderSlider();
                    textDisplay.style.filter = "blur(0)";
                }, 150);
            });
        });

        slider.addEventListener('input', renderSlider);
        renderSlider(); // init run

    </script>
</body>
</html>
